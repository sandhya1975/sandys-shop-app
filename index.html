<!DOCTYPE html>
<html>
<head><title>Sandy's Shop</title></head>
<body>
  <h1>Welcome to Sandy's Shop</h1>

  <h2>Login</h2>
  <input id="username" placeholder="Username" />
  <input id="password" type="password" placeholder="Password" />
  <button id="loginBtn" onclick="login()">Login</button>
  <p id="loginError" style="color:red;display:none">Invalid credentials</p>
  <p id="loginSuccess" style="color:green;display:none">Welcome back!</p>

  <h2>Contact Us</h2>
  <input id="name" placeholder="Your name" />
  <input id="email" placeholder="Your email" />
  <button id="submitBtn" onclick="submitForm()">Submit</button>
  <p id="formSuccess" style="color:green;display:none">Form submitted!</p>
  <p id="formError" style="color:red;display:none">Please fill all fields</p>

  <script>
    function login() {
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;
      if (u === 'admin' && p === 'password123') {
        document.getElementById('loginSuccess').style.display='block';
        document.getElementById('loginError').style.display='none';
      } else {
        document.getElementById('loginError').style.display='block';
        document.getElementById('loginSuccess').style.display='none';
      }
    }
    function submitForm() {
      const n = document.getElementById('name').value;
      const e = document.getElementById('email').value;
      if (n && e) {
        document.getElementById('formSuccess').style.display='block';
        document.getElementById('formError').style.display='none';
      } else {
        document.getElementById('formError').style.display='block';
        document.getElementById('formSuccess').style.display='none';
      }
    }
  </script>
</body>
</html>
