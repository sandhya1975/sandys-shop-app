name: Nano Banana Daily Post
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
jobs:
  generate-post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node nanoBananaPrompt.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - uses: actions/upload-artifact@v4
        with:
          name: nano-banana-post-${{ github.run_id }}
          path: nano-banana-*.txt
