name: Sandy QA Automation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Get the code
      uses: actions/checkout@v3
      
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: npm install
      
    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium
      
    - name: Run Sandy's QA tests
      run: npx playwright test sandys-shop.spec.js --reporter=html
      
    - name: Upload test report
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: sandy-qa-report
        path: playwright-report/
